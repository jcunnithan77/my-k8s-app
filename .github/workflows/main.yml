name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Local Registry
        uses: docker/login-action@v3
        with:
          registry: registry.sriviz.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.sriviz.com/test-app:${{ github.sha }}

      - name: Update K8s Manifest
        run: |
          sed -i "s|image: registry.sriviz.com/test-app:.*|image: registry.sriviz.com/test-app:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push